version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
  # Bun uses npm-compatible package.json; Dependabot npm ecosystem works with bun.lock
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
