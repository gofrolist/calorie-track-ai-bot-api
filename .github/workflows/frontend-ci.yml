name: Frontend CI
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Verify generated API code is up-to-date
      run: |
        bun run api:gen
        bun run format
        git diff --exit-code src/api/ || (echo "Generated API code is out of date. Run 'bun run api:gen && bun run format' and commit the changes." && exit 1)

    - name: Run tests
      run: bun run test

    - name: Build
      run: bun run build
